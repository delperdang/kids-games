<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wizard Dash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border: 2px solid #555;
            border-radius: 4px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>

<body>
    <script>
        class PlayScene extends Phaser.Scene {
            constructor() {
                super('PlayScene');
            }

            create() {
                this.speedStat = 7;
                this.freezeAmmo = 5;
                this.floatAmmo = 3;
                this.xp = 0;
                this.isFlipping = false;
                this.isGameOver = false;
                this.isImmune = false;
                this.isMudImmune = false;
                this.immunityEventId = 0;
                this.isFlying = false;
                this.broomCooldownEnd = 0;
                this.spellActive = false;
                this.isInvisible = false;
                this.invisibilityCooldownEnd = 0;

                // Create textures programmatically
                this.createTextures();

                // Background (Night Sky)
                this.cameras.main.setBackgroundColor('#0d0f1a');

                // Parallax Castle Background
                this.bgCastle = this.add.tileSprite(400, 300, 800, 600, 'castle_bg').setScrollFactor(0);

                // Physics groups
                this.platforms = this.physics.add.staticGroup();
                this.muds = this.physics.add.staticGroup();
                this.monsters = this.physics.add.group();
                this.fireballs = this.physics.add.group();
                this.redboxes = this.physics.add.staticGroup();
                this.cannons = this.physics.add.staticGroup();
                this.cannonFireballs = this.physics.add.group();
                this.blueblocks = this.physics.add.staticGroup();
                this.greenboxes = this.physics.add.staticGroup();
                this.blackboxes = this.physics.add.staticGroup();
                this.purpleboxes = this.physics.add.staticGroup();
                this.freezeRays = this.physics.add.group();
                this.greenRays = this.physics.add.group();

                // Chunk Generation Variables
                this.nextPlatformX = 0;
                this.platformCount = 0; // Keeping track of chunks for blue block logic
                for (let i = 0; i < 15; i++) {
                    this.generatePlatformChunk(i === 0); // first chunk has no mud or gaps
                }

                // Player setup
                // Start a bit above the first platform
                this.player = this.physics.add.sprite(100, 200, 'player_walk');
                this.player.setBounce(0.0);

                // Fine-tune bounding box
                this.player.body.setSize(44, 40);
                this.player.body.setOffset(8, 10);

                // Colliders
                this.physics.add.collider(this.player, this.platforms);
                this.physics.add.collider(this.monsters, this.platforms);
                this.physics.add.collider(this.redboxes, this.platforms);
                this.physics.add.collider(this.cannons, this.platforms);
                this.physics.add.overlap(this.player, this.muds, this.hitMud, null, this);
                this.physics.add.overlap(this.player, this.fireballs, this.hitFireball, null, this);
                this.physics.add.overlap(this.player, this.cannonFireballs, this.hitCannonFireball, null, this);
                this.physics.add.overlap(this.player, this.monsters, this.hitMonster, null, this);
                this.physics.add.overlap(this.player, this.redboxes, this.hitRedBox, null, this);
                this.physics.add.overlap(this.player, this.cannons, this.hitCannon, null, this);
                this.physics.add.overlap(this.player, this.blueblocks, this.hitBlueBlock, null, this);
                this.physics.add.overlap(this.player, this.greenboxes, this.hitGreenBox, null, this);
                this.physics.add.overlap(this.player, this.blackboxes, this.hitBlackBox, null, this);
                this.physics.add.overlap(this.player, this.purpleboxes, this.hitPurpleBox, null, this);

                // Freeze ray hits
                this.physics.add.overlap(this.freezeRays, this.monsters, this.freezeMonster, null, this);
                this.physics.add.overlap(this.freezeRays, this.cannons, this.freezeCannon, null, this);
                this.physics.add.overlap(this.freezeRays, this.platforms, this.destroyFreezeRay, null, this);

                // Green ray hits
                this.physics.add.overlap(this.greenRays, this.monsters, this.floatMonster, null, this);
                this.physics.add.overlap(this.greenRays, this.platforms, this.destroyGreenRay, null, this);

                // Camera Setup
                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                this.cameras.main.setFollowOffset(-150, 100); // Look ahead

                // Controls
                this.keys = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.UP,
                    left: Phaser.Input.Keyboard.KeyCodes.LEFT,
                    right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
                    space: Phaser.Input.Keyboard.KeyCodes.SPACE,
                    w: Phaser.Input.Keyboard.KeyCodes.W,
                    a: Phaser.Input.Keyboard.KeyCodes.A,
                    d: Phaser.Input.Keyboard.KeyCodes.D
                });

                // UI Elements
                this.speedText = this.add.text(20, 20, 'Speed: ' + this.speedStat, {
                    fontSize: '28px', fill: '#ffffff', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.freezeText = this.add.text(180, 20, 'Freeze Rays: ' + this.freezeAmmo, {
                    fontSize: '28px', fill: '#00ffff', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.floatText = this.add.text(180, 50, 'Float Rays: ' + this.floatAmmo, {
                    fontSize: '28px', fill: '#00ff00', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.broomText = this.add.text(450, 20, 'Broom: READY', {
                    fontSize: '28px', fill: '#cca300', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.invisibilityText = this.add.text(450, 50, 'Invis: READY', {
                    fontSize: '28px', fill: '#bbbbbb', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.xpText = this.add.text(20, 60, 'XP: ' + this.xp, {
                    fontSize: '28px', fill: '#ffff00', fontStyle: 'bold', stroke: '#000000', strokeThickness: 4
                }).setScrollFactor(0);

                this.add.text(20, 100, 'Arrows/WASD: Move | UP/Space: Jump | E: Shoot | F: Broom\nU: City | Z: Float | I: Invis', {
                    fontSize: '18px', fill: '#dddddd', stroke: '#000000', strokeThickness: 3, lineSpacing: 5
                }).setScrollFactor(0);

                // Restart & Shoot & Broom & Spell keys
                this.restartKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.R);
                this.shootKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
                this.broomKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.F);
                this.spellKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.U);
                this.floatKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z);
                this.invisKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.I);
            }

            createTextures() {
                const g = this.add.graphics();

                // --- Player Texture (Wizard) ---
                g.fillStyle(0x330066); // Dark purple robe
                g.fillRect(15, 15, 30, 35); // body

                // face
                g.fillStyle(0xffccaa); // skin
                g.fillCircle(30, 10, 8); // head

                // beard
                g.fillStyle(0xdddddd);
                g.fillTriangle(25, 12, 35, 12, 30, 25);

                // pointy hat
                g.fillStyle(0x220044);
                g.fillTriangle(10, 5, 50, 5, 30, -20);

                // staff
                g.fillStyle(0x8b4513); // brown
                g.fillRect(45, 0, 4, 45);
                g.fillStyle(0x00ffff); // gem
                g.fillCircle(47, -2, 6);

                g.generateTexture('player_walk', 60, 50);
                g.clear();

                // --- Player Texture (Wizard on Broom) ---
                g.fillStyle(0x330066); // Dark purple robe
                g.fillRect(15, 15, 30, 35); // body

                // face
                g.fillStyle(0xffccaa); // skin
                g.fillCircle(30, 10, 8); // head

                // beard
                g.fillStyle(0xdddddd);
                g.fillTriangle(25, 12, 35, 12, 30, 25);

                // pointy hat
                g.fillStyle(0x220044);
                g.fillTriangle(10, 5, 50, 5, 30, -20);

                // staff
                g.fillStyle(0x8b4513); // brown
                g.fillRect(45, 0, 4, 45);
                g.fillStyle(0x00ffff); // gem
                g.fillCircle(47, -2, 6);

                // Broomstick
                g.fillStyle(0x8b4513); // Broom handle
                g.fillRect(-10, 35, 80, 5);
                g.fillStyle(0xcca300); // Broom bristles
                g.fillRect(-30, 30, 20, 15);
                g.fillStyle(0x664d00); // Broom wraps
                g.fillRect(-12, 32, 4, 11);

                g.generateTexture('player_fly', 80, 50);
                g.clear();

                // --- Castle Background Texture ---
                g.fillStyle(0x192131); // Dark blue-gray wall
                g.fillRect(0, 200, 800, 400); // Main base wall

                // Battlements
                for (let i = 0; i < 800; i += 60) {
                    g.fillRect(i, 160, 30, 40);
                }

                // Towers
                g.fillStyle(0x141a27); // Darker tower shadow
                g.fillRect(100, 50, 100, 400);
                g.fillRect(500, 50, 100, 400);

                // Tower roofs
                g.fillStyle(0x0a0c12); // Almost black roofs
                g.fillTriangle(90, 50, 210, 50, 150, -50);
                g.fillTriangle(490, 50, 610, 50, 550, -50);

                // Windows (Lit)
                g.fillStyle(0xffaa00);
                g.fillRect(140, 100, 20, 30);
                g.fillRect(540, 100, 20, 30);

                g.generateTexture('castle_bg', 800, 600);
                g.clear();

                // --- City Background Texture ---
                g.fillStyle(0x1a0f2e); // Dark purple night sky
                g.fillRect(0, 0, 800, 600);

                // Moon
                g.fillStyle(0xffffcc);
                g.fillCircle(650, 100, 40);

                // Distant buildings
                g.fillStyle(0x2a1b41);
                g.fillRect(50, 300, 100, 300);
                g.fillRect(200, 250, 80, 400);
                g.fillRect(350, 350, 120, 250);
                g.fillRect(550, 280, 90, 350);
                g.fillRect(700, 200, 150, 400);

                // Closer buildings
                g.fillStyle(0x0f0a1c);
                g.fillRect(0, 400, 80, 200);
                g.fillRect(120, 380, 100, 250);
                g.fillRect(280, 420, 100, 200);
                g.fillRect(450, 360, 120, 250);
                g.fillRect(620, 450, 100, 150);

                // Windows
                g.fillStyle(0xffff00);
                const addWindows = (startX, startY, width, height) => {
                    for (let x = startX + 10; x < startX + width - 10; x += 20) {
                        for (let y = startY + 20; y < startY + height - 20; y += 30) {
                            if (Math.random() > 0.5) g.fillRect(x, y, 10, 15);
                        }
                    }
                };

                // Add windows to distant buildings
                addWindows(50, 300, 100, 300);
                addWindows(200, 250, 80, 400);
                addWindows(350, 350, 120, 250);
                addWindows(550, 280, 90, 350);
                addWindows(700, 200, 150, 400);

                // Add windows to closer buildings
                addWindows(0, 400, 80, 200);
                addWindows(120, 380, 100, 250);
                addWindows(280, 420, 100, 200);
                addWindows(450, 360, 120, 250);
                addWindows(620, 450, 100, 150);

                g.generateTexture('city_bg', 800, 600);
                g.clear();

                // --- Mud Puddle Texture ---
                g.fillStyle(0x4a3219); // Mud brown
                g.fillEllipse(30, 10, 50, 12);
                g.generateTexture('mud', 60, 20);
                g.clear();

                // --- Platform Array Generation (Yellow) ---
                g.fillStyle(0xcccc00);
                g.fillRect(0, 0, 100, 40);
                g.fillStyle(0xffff00);
                g.fillRect(0, 0, 100, 4); // Top edge highlight
                g.generateTexture('platform', 100, 40);
                g.clear();

                // --- Monster Texture ---
                g.fillStyle(0x00cc00);
                g.fillRoundedRect(5, 10, 30, 40, 5);
                g.fillStyle(0x00aa00); // Arms
                g.fillRect(0, 25, 5, 15);
                g.fillRect(35, 25, 5, 15);
                g.fillStyle(0xffffff); // Eyes
                g.fillCircle(15, 20, 5);
                g.fillCircle(25, 20, 5);
                g.fillStyle(0xff0000); // Pupils
                g.fillCircle(15, 20, 2);
                g.fillCircle(25, 20, 2);
                g.generateTexture('monster', 40, 50);
                g.clear();

                // --- Fireball Texture ---
                g.fillStyle(0xff5500);
                g.fillCircle(10, 10, 10);
                g.fillStyle(0xffff00);
                g.fillCircle(7, 7, 5);
                g.generateTexture('fireball', 20, 20);
                g.clear();

                // --- Red Box Texture ---
                g.fillStyle(0xff0000);
                g.fillRect(5, 5, 20, 20);
                g.fillStyle(0xffaaaa);
                g.fillRect(8, 8, 14, 14);
                g.fillStyle(0xff0000);
                g.fillRect(12, 12, 6, 6);
                g.generateTexture('redbox', 30, 30);
                g.clear();

                // --- Green Box Texture ---
                g.fillStyle(0x00aa00);
                g.fillRect(5, 5, 20, 20);
                g.fillStyle(0xaaffaa);
                g.fillRect(8, 8, 14, 14);
                g.fillStyle(0x00cc00);
                g.fillRect(12, 12, 6, 6);
                g.generateTexture('greenbox', 30, 30);
                g.clear();

                // --- Freeze Ray Texture ---
                g.fillStyle(0x00ffff);
                g.fillRect(0, 0, 20, 6);
                g.fillStyle(0xffffff);
                g.fillRect(4, 1, 12, 4);
                g.generateTexture('freezeray', 20, 6);
                g.clear();

                // --- Green Ray Texture ---
                g.fillStyle(0x00ff00);
                g.fillRect(0, 0, 20, 6);
                g.fillStyle(0xaaffaa);
                g.fillRect(4, 1, 12, 4);
                g.generateTexture('greenray', 20, 6);
                g.clear();

                // --- Cannon Texture ---
                g.fillStyle(0x111111);
                g.fillRect(10, 20, 20, 20); // Base
                g.fillStyle(0x222222);
                g.fillRect(0, 10, 30, 15); // Barrel
                g.generateTexture('cannon', 40, 40);
                g.clear();

                // --- Blue Block Texture ---
                g.fillStyle(0x0088ff);
                g.fillRect(5, 5, 20, 20);
                g.fillStyle(0xaaddff);
                g.fillRect(8, 8, 14, 14);
                g.fillStyle(0x0088ff);
                g.fillRect(12, 12, 6, 6);
                g.generateTexture('blueblock', 30, 30);

                // --- Black Box Texture ---
                g.fillStyle(0x111111);
                g.fillRect(5, 5, 20, 20);
                g.fillStyle(0x444444);
                g.fillRect(8, 8, 14, 14);
                g.fillStyle(0x111111);
                g.fillRect(12, 12, 6, 6);
                g.generateTexture('blackbox', 30, 30);
                g.clear();

                // --- Purple Box Texture ---
                g.fillStyle(0x800080);
                g.fillRect(5, 5, 20, 20);
                g.fillStyle(0xdba1db);
                g.fillRect(8, 8, 14, 14);
                g.fillStyle(0x800080);
                g.fillRect(12, 12, 6, 6);
                g.generateTexture('purplebox', 30, 30);
                g.destroy();
            }

            generatePlatformChunk(isFirst = false) {
                // Determine width of this platform chunk
                const widthChunks = isFirst ? 15 : Phaser.Math.Between(3, 8);
                const platY = isFirst ? 400 : Phaser.Math.Between(300, 500);

                // Build platform chunk
                for (let i = 0; i < widthChunks; i++) {
                    const platX = this.nextPlatformX + i * 100 + 50;
                    this.platforms.create(platX, platY, 'platform').setOrigin(0.5, 0).refreshBody();
                }

                // To prevent overlapping, let's keep track of occupied indices
                const occupiedIndices = new Set();

                // Chance to add mud puddle (not on the very first starting platform)
                if (!isFirst && widthChunks > 2 && Phaser.Math.Between(0, 100) < 60) {
                    // Place mud somewhere in the middle of platform to avoid edges
                    const mudIndex = Phaser.Math.Between(1, widthChunks - 2);
                    occupiedIndices.add(mudIndex);

                    const mudX = this.nextPlatformX + mudIndex * 100 + 50;

                    const mud = this.muds.create(mudX, platY, 'mud').setOrigin(0.5, 1).refreshBody();
                    mud.body.setSize(40, 10);
                    mud.body.setOffset(10, 10);
                    mud.hasBeenHit = false; // Custom property to track collection
                }

                // Chance to create a red box
                if (!isFirst && widthChunks >= 2 && Phaser.Math.Between(0, 100) < 20) {
                    const boxIndex = Phaser.Math.Between(0, widthChunks - 1);
                    const boxX = this.nextPlatformX + boxIndex * 100 + 50;
                    const boxY = platY - 80;
                    const box = this.redboxes.create(boxX, boxY, 'redbox').setOrigin(0.5, 1).refreshBody();
                    box.hasBeenCollected = false;
                }

                // Chance to create a cannon
                if (!isFirst && widthChunks > 3 && Phaser.Math.Between(0, 100) < 30) {
                    let cannonIndex = Phaser.Math.Between(1, widthChunks - 2);
                    // Try to find an unoccupied spot
                    let attempts = 0;
                    while (occupiedIndices.has(cannonIndex) && attempts < 5) {
                        cannonIndex = Phaser.Math.Between(1, widthChunks - 2);
                        attempts++;
                    }

                    if (!occupiedIndices.has(cannonIndex)) {
                        occupiedIndices.add(cannonIndex);
                        const cannonX = this.nextPlatformX + cannonIndex * 100 + 50;
                        const cannonY = platY; // Sit directly on platform
                        const cannon = this.cannons.create(cannonX, cannonY, 'cannon').setOrigin(0.5, 1).refreshBody();
                        cannon.lastFired = 0;
                        cannon.hasBeenHit = false;
                    }
                }

                // Chance to create a monster
                if (!isFirst && widthChunks > 3 && Phaser.Math.Between(0, 100) < 40) {
                    let monsterIndex = Phaser.Math.Between(1, widthChunks - 2);
                    let attempts = 0;
                    while (occupiedIndices.has(monsterIndex) && attempts < 5) {
                        monsterIndex = Phaser.Math.Between(1, widthChunks - 2);
                        attempts++;
                    }

                    if (!occupiedIndices.has(monsterIndex)) {
                        occupiedIndices.add(monsterIndex);
                        const monsterX = this.nextPlatformX + monsterIndex * 100 + 50;
                        const monster = this.monsters.create(monsterX, platY - 40, 'monster');
                        monster.setBounce(0);
                        monster.lastFired = 0;
                        monster.hasBeenHit = false;
                    }
                }

                // Chance to create a blue block (Increased commonality to 40%)
                this.platformCount++;
                if (!isFirst && this.platformCount % 4 === 0) {
                    let bIndex = Phaser.Math.Between(0, widthChunks - 1);
                    let attempts = 0;
                    while (occupiedIndices.has(bIndex) && attempts < 5) {
                        bIndex = Phaser.Math.Between(0, widthChunks - 1);
                        attempts++;
                    }

                    const bX = this.nextPlatformX + bIndex * 100 + 50;
                    const bY = platY - 80;
                    const bBlock = this.blueblocks.create(bX, bY, 'blueblock').setOrigin(0.5, 1).refreshBody();
                    bBlock.hasBeenCollected = false;
                }

                // Chance to create a green box (Ammo reload)
                if (!isFirst && widthChunks >= 2 && Phaser.Math.Between(0, 100) < 25) {
                    let gIndex = Phaser.Math.Between(0, widthChunks - 1);
                    let attempts = 0;
                    while (occupiedIndices.has(gIndex) && attempts < 5) {
                        gIndex = Phaser.Math.Between(0, widthChunks - 1);
                        attempts++;
                    }

                    if (!occupiedIndices.has(gIndex)) {
                        occupiedIndices.add(gIndex);
                        const gX = this.nextPlatformX + gIndex * 100 + 50;
                        const gY = platY - 80;
                        const gBox = this.greenboxes.create(gX, gY, 'greenbox').setOrigin(0.5, 1).refreshBody();
                        gBox.hasBeenCollected = false;
                    }
                }

                // Chance to create a black box (Mud Immunity)
                if (!isFirst && widthChunks >= 2 && Phaser.Math.Between(0, 100) < 20) {
                    let blkIndex = Phaser.Math.Between(0, widthChunks - 1);
                    let attempts = 0;
                    while (occupiedIndices.has(blkIndex) && attempts < 5) {
                        blkIndex = Phaser.Math.Between(0, widthChunks - 1);
                        attempts++;
                    }

                    if (!occupiedIndices.has(blkIndex)) {
                        occupiedIndices.add(blkIndex);
                        const blkX = this.nextPlatformX + blkIndex * 100 + 50;
                        const blkY = platY - 80;
                        const blkBox = this.blackboxes.create(blkX, blkY, 'blackbox').setOrigin(0.5, 1).refreshBody();
                        blkBox.hasBeenCollected = false;
                    }
                }

                // Chance to create a purple box (Float Ammo)
                if (!isFirst && widthChunks >= 2 && Phaser.Math.Between(0, 100) < 25) {
                    let pIndex = Phaser.Math.Between(0, widthChunks - 1);
                    let attempts = 0;
                    while (occupiedIndices.has(pIndex) && attempts < 5) {
                        pIndex = Phaser.Math.Between(0, widthChunks - 1);
                        attempts++;
                    }

                    if (!occupiedIndices.has(pIndex)) {
                        occupiedIndices.add(pIndex);
                        const pX = this.nextPlatformX + pIndex * 100 + 50;
                        const pY = platY - 80;
                        const pBox = this.purpleboxes.create(pX, pY, 'purplebox').setOrigin(0.5, 1).refreshBody();
                        pBox.hasBeenCollected = false;
                    }
                }

                // Advance X for next platform with a gap (but no gap after first chunk to be safe)
                // The gap is the 'jumps' obstacle mentioned in the prompt
                const gap = isFirst ? 0 : Phaser.Math.Between(80, 200);
                this.nextPlatformX += (widthChunks * 100) + gap;
            }

            update() {
                if (this.isGameOver) {
                    // Allow restart when dead
                    if (Phaser.Input.Keyboard.JustDown(this.restartKey)) {
                        this.scene.restart();
                    }
                    return;
                }

                // Procedural generation of world as player moves right
                if (this.player.x + 1200 > this.nextPlatformX) {
                    this.generatePlatformChunk();
                }

                // Parallax scrolling
                if (this.bgCastle) {
                    this.bgCastle.tilePositionX = this.cameras.main.scrollX * 0.3;
                }

                // Fall off stringently / die by pit
                if (this.player.y > 800) {
                    this.speedStat = 0;
                    this.speedText.setText('Speed: 0');
                    this.triggerGameOver();
                    return;
                }

                // UI Updates
                if (this.time.now < this.broomCooldownEnd && !this.isFlying) {
                    const remaining = Math.ceil((this.broomCooldownEnd - this.time.now) / 1000);
                    this.broomText.setText('Broom: ' + remaining + 's');
                    this.broomText.setFill('#ff0000');
                } else if (!this.isFlying) {
                    this.broomText.setText('Broom: READY');
                    this.broomText.setFill('#cca300');
                } else if (this.isFlying) {
                    this.broomText.setText('Broom: ACTIVE');
                    this.broomText.setFill('#00ff00');
                }

                if (this.isInvisible) {
                    const remaining = Math.ceil((this.invisibilityCooldownEnd - 20000 - this.time.now) / 1000);
                    this.invisibilityText.setText('Invis: ' + remaining + 's left');
                    this.invisibilityText.setFill('#00ff00');
                } else if (this.time.now < this.invisibilityCooldownEnd) {
                    const remaining = Math.ceil((this.invisibilityCooldownEnd - this.time.now) / 1000);
                    this.invisibilityText.setText('Invis CD: ' + remaining + 's');
                    this.invisibilityText.setFill('#ff0000');
                } else {
                    this.invisibilityText.setText('Invis: READY');
                    this.invisibilityText.setFill('#bbbbbb');
                }

                // Controls and Input Checking
                const isLeftDown = this.keys.left.isDown || this.keys.a.isDown;
                const isRightDown = this.keys.right.isDown || this.keys.d.isDown;
                const isUpDown = this.keys.up.isDown || this.keys.w.isDown;
                const isDownDown = this.keys.down?.isDown || this.keys.s?.isDown;
                const isJumpDown = Phaser.Input.Keyboard.JustDown(this.keys.up) ||
                    Phaser.Input.Keyboard.JustDown(this.keys.space) ||
                    Phaser.Input.Keyboard.JustDown(this.keys.w);

                // Broom toggle
                if (Phaser.Input.Keyboard.JustDown(this.broomKey)) {
                    this.toggleBroom();
                }

                // City spell toggle
                if (Phaser.Input.Keyboard.JustDown(this.spellKey)) {
                    this.castCitySpell();
                }

                if (Phaser.Input.Keyboard.JustDown(this.floatKey)) {
                    this.shootGreenRay();
                }

                if (Phaser.Input.Keyboard.JustDown(this.invisKey)) {
                    this.toggleInvisibility();
                }

                // Base speed calculation
                const currentMaxSpeed = Math.max(0, this.speedStat * 50);

                // Flying logic
                if (this.isFlying) {
                    this.player.body.setAllowGravity(false);
                    // Omni-directional movement
                    if (isLeftDown) {
                        this.player.setVelocityX(-currentMaxSpeed);
                        this.player.flipX = true;
                    } else if (isRightDown) {
                        this.player.setVelocityX(currentMaxSpeed);
                        this.player.flipX = false;
                    } else {
                        this.player.setVelocityX(0);
                    }

                    if (isUpDown) {
                        this.player.setVelocityY(-currentMaxSpeed);
                    } else if (isDownDown) {
                        this.player.setVelocityY(currentMaxSpeed);
                    } else {
                        this.player.setVelocityY(0);
                    }

                    // Don't fly higher than the top of screen
                    if (this.player.y < 50) this.player.y = 50;

                } else {
                    // Normal Ground Logic
                    this.player.body.setAllowGravity(true);

                    // Horizontal movement
                    if (isLeftDown) {
                        this.player.setVelocityX(-currentMaxSpeed);
                        this.player.flipX = true;
                    } else if (isRightDown) {
                        this.player.setVelocityX(currentMaxSpeed);
                        this.player.flipX = false;
                    } else {
                        this.player.setVelocityX(0);
                    }

                    // Jumping Logic
                    const isGrounded = this.player.body.touching.down;

                    if (isJumpDown && isGrounded && !this.isFlipping) {
                        this.player.setVelocityY(-550); // Jump strength
                        this.isFlipping = true;

                        // The faster we are moving horizontally, the more XP we gain from the flip
                        const currentVelX = Math.abs(this.player.body.velocity.x);
                        const speedMultiplier = (currentVelX / 50); // will be up to this.speedStat
                        const gainedXp = Math.floor(10 + speedMultiplier * 5);

                        this.xp += gainedXp;
                        this.xpText.setText('XP: ' + this.xp);

                        this.showFloatingText('+' + gainedXp + ' XP', this.player.x, this.player.y - 40, '#ffff00');

                        // Do flip animation
                        this.tweens.add({
                            targets: this.player,
                            angle: this.player.flipX ? -360 : 360,
                            duration: 800,
                            onComplete: () => {
                                this.player.angle = 0;
                            }
                        });
                    }

                    // Reset flipping state upon landing
                    if (isGrounded && this.player.body.velocity.y >= 0) {
                        this.isFlipping = false;
                    }
                }

                // Shooting Logic
                if (Phaser.Input.Keyboard.JustDown(this.shootKey)) {
                    this.shootFreezeRay();
                }

                // Monster behavior
                this.monsters.children.iterate((monster) => {
                    if (!monster || monster.hasBeenHit) return;

                    // Skip if frozen
                    if (this.time.now < (monster.freezeEndTime || 0)) return;

                    // Skip if floating
                    if (monster.isFloating) return;

                    // Thaw visual
                    if (monster.isFrozen && this.time.now >= monster.freezeEndTime) {
                        monster.isFrozen = false;
                        monster.clearTint();
                    }

                    if (!this.isInvisible && Math.abs(this.player.x - monster.x) < 800 && this.player.x < monster.x) {
                        if (this.time.now > monster.lastFired) {
                            monster.lastFired = this.time.now + Phaser.Math.Between(1500, 3000);
                            this.throwFireball(monster);
                        }
                    }
                });

                // Cannon behavior
                this.cannons.children.iterate((cannon) => {
                    if (!cannon || cannon.hasBeenHit) return;

                    // Skip if frozen
                    if (this.time.now < (cannon.freezeEndTime || 0)) return;

                    // Thaw visual
                    if (cannon.isFrozen && this.time.now >= cannon.freezeEndTime) {
                        cannon.isFrozen = false;
                        cannon.clearTint();
                    }

                    if (!this.isInvisible && Math.abs(this.player.x - cannon.x) < 800 && this.player.x < cannon.x) {
                        if (this.time.now > cannon.lastFired) {
                            cannon.lastFired = this.time.now + Phaser.Math.Between(2000, 4000);
                            this.shootCannonFireball(cannon);
                        }
                    }
                });
            }

            shootFreezeRay() {
                if (this.isGameOver || this.freezeAmmo <= 0) return;

                this.freezeAmmo--;
                this.freezeText.setText('Freeze Rays: ' + this.freezeAmmo);

                const ray = this.freezeRays.create(this.player.x + (this.player.flipX ? -30 : 30), this.player.y, 'freezeray');
                ray.body.setAllowGravity(false);
                ray.body.velocity.x = this.player.flipX ? -600 : 600;

                this.time.delayedCall(2000, () => {
                    if (ray && ray.active) ray.destroy();
                });
            }

            shootGreenRay() {
                if (this.isGameOver || this.floatAmmo <= 0) return;

                this.floatAmmo--;
                this.floatText.setText('Float Rays: ' + this.floatAmmo);

                const ray = this.greenRays.create(this.player.x + (this.player.flipX ? -30 : 30), this.player.y, 'greenray');
                ray.body.setAllowGravity(false);
                ray.body.velocity.x = this.player.flipX ? -600 : 600;

                this.time.delayedCall(2000, () => {
                    if (ray && ray.active) ray.destroy();
                });
            }

            toggleBroom() {
                if (this.isGameOver) return;

                if (this.isFlying) {
                    // Dismount
                    this.loseBroom();
                } else if (this.time.now >= this.broomCooldownEnd) {
                    // Mount broom
                    this.isFlying = true;
                    this.player.setTexture('player_fly');
                    this.player.body.setSize(64, 40); // larger bounding box
                    this.player.body.setOffset(8, 10);
                    this.showFloatingText('FLYING!', this.player.x, this.player.y - 30, '#cca300');
                }
            }

            loseBroom() {
                if (!this.isFlying) return;
                this.isFlying = false;
                this.player.setTexture('player_walk');
                this.player.body.setSize(44, 40);
                this.player.body.setOffset(8, 10);

                this.broomCooldownEnd = this.time.now + 15000; // 15 seconds cooldown
                this.showFloatingText('BROOM BROKEN!', this.player.x, this.player.y - 30, '#ff0000');
            }

            toggleInvisibility() {
                if (this.isGameOver || this.isInvisible || this.time.now < this.invisibilityCooldownEnd) return;

                this.isInvisible = true;
                this.player.alpha = 0.3; // Make player semitransparent to indicate invisibility
                this.invisibilityCooldownEnd = this.time.now + 50000; // 30s duration + 20s cooldown

                this.showFloatingText('INVISIBLE!', this.player.x, this.player.y - 30, '#bbbbbb');

                this.time.delayedCall(30000, () => {
                    if (this.isGameOver) return;
                    this.isInvisible = false;
                    this.player.alpha = 1; // Restore full opacity
                    this.showFloatingText('VISIBLE!', this.player.x, this.player.y - 30, '#ff0000');
                });
            }

            castCitySpell() {
                if (this.isGameOver) return;

                if (this.spellActive) {
                    this.spellActive = false;
                    this.bgCastle.setTexture('castle_bg');
                    this.showFloatingText('CASTLE!', this.player.x, this.player.y - 30, '#aaaaaa');
                } else {
                    this.spellActive = true;
                    this.bgCastle.setTexture('city_bg');
                    this.showFloatingText('CITY SPELL!', this.player.x, this.player.y - 30, '#ff00ff');
                }
            }

            freezeMonster(ray, monster) {
                if (monster.hasBeenHit || monster.isFrozen) return;
                ray.destroy();

                monster.isFrozen = true;
                monster.freezeEndTime = this.time.now + 13000; // 13 seconds
                monster.setTint(0x00ffff);
                this.showFloatingText('FROZEN!', monster.x, monster.y - 30, '#00ffff');
            }

            freezeCannon(ray, cannon) {
                if (cannon.hasBeenHit || cannon.isFrozen) return;
                ray.destroy();

                cannon.isFrozen = true;
                cannon.freezeEndTime = this.time.now + 13000; // 13 seconds
                cannon.setTint(0x00ffff);
                this.showFloatingText('FROZEN!', cannon.x, cannon.y - 30, '#00ffff');
            }

            destroyFreezeRay(ray, platform) {
                ray.destroy();
            }

            floatMonster(ray, monster) {
                if (monster.hasBeenHit || monster.isFloating) return;
                ray.destroy();

                monster.isFloating = true;
                monster.body.setAllowGravity(false);
                monster.body.velocity.y = -50; // Slowly float up

                // Stop moving up after half a second
                this.time.delayedCall(500, () => {
                    if (monster && monster.active) {
                        monster.body.velocity.y = 0;
                        monster.body.velocity.x = 0;
                    }
                });

                monster.setTint(0x00ff00);
                this.showFloatingText('FLOATING!', monster.x, monster.y - 30, '#00ff00');

                // Float for 7 seconds
                this.time.delayedCall(7000, () => {
                    if (monster && monster.active && !monster.hasBeenHit) {
                        monster.isFloating = false;
                        monster.body.setAllowGravity(true);

                        // Restore previous tint or clear it
                        if (this.time.now < (monster.freezeEndTime || 0)) {
                            monster.setTint(0x00ffff);
                        } else {
                            monster.clearTint();
                        }
                    }
                });
            }

            destroyGreenRay(ray, platform) {
                ray.destroy();
            }

            throwFireball(monster) {
                if (this.isGameOver) return;
                const fireball = this.fireballs.create(monster.x - 20, monster.y, 'fireball');
                fireball.body.setAllowGravity(false);

                // Shoot towards the left where player likely is
                const angle = Phaser.Math.Angle.Between(monster.x, monster.y, Math.max(monster.x - 400, this.player.x), this.player.y);
                const speed = 300;
                this.physics.velocityFromRotation(angle, speed, fireball.body.velocity);

                // Destroy fireball after 4 seconds
                this.time.delayedCall(4000, () => {
                    if (fireball && fireball.active) fireball.destroy();
                });
            }

            shootCannonFireball(cannon) {
                if (this.isGameOver) return;
                const fireball = this.cannonFireballs.create(cannon.x - 20, cannon.y - 25, 'fireball');
                fireball.body.setAllowGravity(false);

                // Shoot straight left towards player
                fireball.body.velocity.x = -400;

                // Destroy fireball after 4 seconds
                this.time.delayedCall(4000, () => {
                    if (fireball && fireball.active) fireball.destroy();
                });
            }

            hitCannonFireball(player, fireball) {
                if (this.isGameOver) return;
                fireball.destroy();
                if (this.isImmune) return;

                if (this.isFlying) {
                    this.loseBroom();
                }

                this.speedStat -= 1;
                this.speedText.setText('Speed: ' + this.speedStat);
                this.showFloatingText('-1 SPEED', this.player.x, this.player.y - 20, '#ffaa00');

                this.player.setVelocityX(this.player.body.velocity.x * 0.5);
                this.cameras.main.shake(100, 0.01);

                if (this.speedStat <= 0) {
                    this.speedStat = 0;
                    this.speedText.setText('Speed: 0');
                    this.triggerGameOver();
                }
            }

            hitCannon(player, cannon) {
                if (cannon.hasBeenHit || this.isGameOver) return;
                cannon.hasBeenHit = true;

                if (this.isFlying) {
                    this.loseBroom();
                }

                this.showFloatingText('CRUSHED!', cannon.x, cannon.y - 30, '#aaaaaa');
                this.xp += 20;
                this.xpText.setText('XP: ' + this.xp);

                cannon.destroy();
            }

            hitBlueBlock(player, block) {
                if (block.hasBeenCollected || this.isGameOver) return;
                block.hasBeenCollected = true;

                block.destroy();

                this.isImmune = true;
                this.isMudImmune = false;
                this.immunityEventId++;
                const currentEventId = this.immunityEventId;

                this.player.setTint(0x0088ff);
                this.showFloatingText('FIRE IMMUNE!', this.player.x, this.player.y - 30, '#0088ff');

                this.time.delayedCall(10000, () => {
                    if (this.isGameOver || this.immunityEventId !== currentEventId) return;
                    this.isImmune = false;
                    this.player.clearTint();
                });
            }

            hitBlackBox(player, box) {
                if (box.hasBeenCollected || this.isGameOver) return;
                box.hasBeenCollected = true;

                box.destroy();

                this.isMudImmune = true;
                this.isImmune = false;
                this.immunityEventId++;
                const currentEventId = this.immunityEventId;

                this.player.setTint(0x444444);
                this.showFloatingText('MUD IMMUNE!', this.player.x, this.player.y - 30, '#aaaaaa');

                this.time.delayedCall(30000, () => {
                    if (this.isGameOver || this.immunityEventId !== currentEventId) return;
                    this.isMudImmune = false;
                    this.player.clearTint();
                });
            }

            hitFireball(player, fireball) {
                if (this.isGameOver) return;
                fireball.destroy();

                if (this.isImmune) return;

                if (this.isFlying) {
                    this.loseBroom();
                }

                this.speedStat -= 2;
                this.speedText.setText('Speed: ' + this.speedStat);
                this.showFloatingText('-2 SPEED', this.player.x, this.player.y - 20, '#ffaa00');

                this.player.setVelocityX(this.player.body.velocity.x * 0.3);
                this.cameras.main.shake(150, 0.015);

                if (this.speedStat <= 0) {
                    this.speedStat = 0;
                    this.speedText.setText('Speed: 0');
                    this.triggerGameOver();
                }
            }

            hitMonster(player, monster) {
                if (monster.hasBeenHit || this.isGameOver) return;

                // Determine if player jumped on head (player falling and above monster)
                if (player.body.velocity.y > 0 && player.y < monster.y && !this.isFlying) {
                    monster.hasBeenHit = true;
                    monster.setTint(0xff0000);
                    this.tweens.add({
                        targets: monster,
                        y: monster.y + 50,
                        alpha: 0,
                        duration: 300,
                        onComplete: () => monster.destroy()
                    });

                    player.setVelocityY(-450); // Bounce off head
                    this.showFloatingText('DEFEATED!', monster.x, monster.y - 30, '#00ff00');
                    this.xp += 50;
                    this.xpText.setText('XP: ' + this.xp);
                } else {
                    // Hit from the side
                    if (this.isImmune) {
                        monster.hasBeenHit = true;
                        this.showFloatingText('SMASHED!', monster.x, monster.y - 30, '#0088ff');
                        monster.destroy();
                        return;
                    }

                    if (this.isFlying) {
                        this.loseBroom();
                    }

                    monster.hasBeenHit = true;
                    this.speedStat -= 2;
                    this.speedText.setText('Speed: ' + this.speedStat);
                    this.showFloatingText('-2 SPEED', this.player.x, this.player.y - 20, '#ff0000');

                    this.player.setVelocityX(this.player.body.velocity.x * -0.5); // bounce back
                    this.cameras.main.shake(150, 0.015);

                    monster.destroy();

                    if (this.speedStat <= 0) {
                        this.speedStat = 0;
                        this.speedText.setText('Speed: 0');
                        this.triggerGameOver();
                    }
                }
            }

            hitGreenBox(player, box) {
                if (box.hasBeenCollected || this.isGameOver) return;
                box.hasBeenCollected = true;

                box.destroy();

                this.freezeAmmo = 5;
                this.freezeText.setText('Freeze Rays: ' + this.freezeAmmo);
                this.showFloatingText('FREEZE RELOAD!', this.player.x, this.player.y - 30, '#00ff00');
            }

            hitPurpleBox(player, box) {
                if (box.hasBeenCollected || this.isGameOver) return;
                box.hasBeenCollected = true;

                box.destroy();

                this.floatAmmo = 3;
                this.floatText.setText('Float Rays: ' + this.floatAmmo);
                this.showFloatingText('FLOAT RELOAD!', this.player.x, this.player.y - 30, '#cc00ff');
            }

            hitRedBox(player, box) {
                if (box.hasBeenCollected || this.isGameOver) return;
                box.hasBeenCollected = true;

                box.destroy();

                this.speedStat = 7;
                this.speedText.setText('Speed: ' + this.speedStat);
                this.showFloatingText('MAX SPEED!', this.player.x, this.player.y - 30, '#ff0000');
            }

            hitMud(player, mud) {
                if (this.isMudImmune) return;
                if (!mud.hasBeenHit && !this.isGameOver) {
                    mud.hasBeenHit = true;

                    // Lose 2 speed
                    this.speedStat -= 2;
                    this.speedText.setText('Speed: ' + this.speedStat);
                    this.showFloatingText('-2 SPEED', this.player.x, this.player.y - 20, '#ff0000');

                    mud.setTint(0x555555); // Visually indicate it's exhausted

                    // Small bounce / slow down
                    this.player.setVelocityX(this.player.body.velocity.x * 0.3);

                    // Screen shake impact
                    this.cameras.main.shake(150, 0.01);

                    // If you lose all speed you start over
                    if (this.speedStat <= 0) {
                        this.speedStat = 0;
                        this.speedText.setText('Speed: 0');
                        this.triggerGameOver();
                    }
                }
            }

            showFloatingText(msg, x, y, color) {
                const t = this.add.text(x, y, msg, {
                    fontSize: '22px', fill: color, fontStyle: 'bold', stroke: '#000000', strokeThickness: 3
                }).setOrigin(0.5);

                this.tweens.add({
                    targets: t,
                    y: y - 50,
                    alpha: 0,
                    duration: 1200,
                    ease: 'Power1',
                    onComplete: () => t.destroy()
                });
            }

            triggerGameOver() {
                this.isGameOver = true;
                this.player.setTint(0xff0000);
                this.player.setVelocityX(0); // Stop immediately
                this.physics.pause();

                // Dim screen
                const bg = this.add.rectangle(400, 300, 800, 600, 0x000000, 0.7).setScrollFactor(0);

                const style = { fontSize: '48px', fill: '#ff4444', fontStyle: 'bold', align: 'center', stroke: '#000', strokeThickness: 4 };
                this.add.text(400, 250, 'GAME OVER', style).setOrigin(0.5).setScrollFactor(0);

                this.add.text(400, 350, 'Final XP: ' + this.xp + '\n\nPress R or Click to Restart', {
                    fontSize: '24px', fill: '#ffffff', align: 'center'
                }).setOrigin(0.5).setScrollFactor(0);

                // Restart from click map or key
                this.input.once('pointerdown', () => {
                    this.scene.restart();
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: document.body,
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 1000 },
                    debug: false
                }
            },
            scene: PlayScene
        };

        const game = new Phaser.Game(config);
    </script>
</body>
